
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Edit Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md mx-auto">
    <div class="relative">
      <!-- Glow effect -->
      <div class="absolute -inset-0.5 bg-gradient-to-r from-blue-500 to-purple-500 rounded-2xl blur opacity-20 animate-pulse"></div>
      
      <!-- Main card -->
      <div class="relative bg-white backdrop-blur-xl rounded-2xl shadow-lg border border-gray-200 p-8 space-y-6">
        
        <!-- Header -->
        <div class="text-center space-y-2">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-blue-500 to-purple-500 mb-4">
            <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 2a5 5 0 00-5 5v1H4a2 2 0 00-2 2v7a2 2 0 002 2h12a2 2 0 002-2v-7a2 2 0 00-2-2h-1V7a5 5 0 00-5-5z"/>
            </svg>
          </div>
          <h2 class="text-2xl font-bold bg-gradient-to-r from-blue-500 to-purple-500 bg-clip-text text-transparent">
            Profile updation
          </h2>
          <p class="text-sm text-gray-500">Manage your account information</p>
        </div>

        <!-- Form Fields -->
         <form id="adminForm" class="space-y-5">

          <!-- Username Field -->
          <div class="space-y-2">
            <label for="username" class="text-sm font-medium flex items-center gap-2">
              <svg class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-6 7a6 6 0 1112 0H4z"/>
              </svg>
              Username
            </label>
            <input 
              id="username"
              type="text"
              
              
              class="h-12 w-full pl-4 pr-4 bg-gray-100 border border-gray-300 rounded-lg 
                     disabled:opacity-70 disabled:cursor-not-allowed
                     focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:shadow-md"
            />
          </div>

          <!-- Email Field -->
          <div class="space-y-2">
            <label for="email" class="text-sm font-medium flex items-center gap-2">
              <svg class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                <path d="M2.94 6.34A2 2 0 014.77 5h10.46a2 2 0 011.83 1.34L10 11.5 2.94 6.34z"/>
                <path d="M18 8.118l-8 5.333-8-5.333V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
              </svg>
              Email
            </label>
            <input 
              id="email"
              type="email"
              
              class="h-12 w-full pl-4 pr-4 bg-gray-100 border border-gray-300 rounded-lg 
                     disabled:opacity-70 disabled:cursor-not-allowed
                     focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:shadow-md"
            />
          </div>

          <!-- Password Field -->
          <div class="space-y-2">
            <label for="password" class="text-sm font-medium flex items-center gap-2">
              <svg class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v2H5a1 1 0 000 2h10a1 1 0 100-2h-1V6a4 4 0 00-4-4zM6 10h8v6a2 2 0 01-2 2H8a2 2 0 01-2-2v-6z" clip-rule="evenodd"/>
              </svg>
              Password
            </label>
            <input 
              id="password"
              type="password"
          
              class="h-12 w-full pl-4 pr-4 bg-gray-100 border border-gray-300 rounded-lg 
                     disabled:opacity-70 disabled:cursor-not-allowed
                     focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:shadow-md"
            />
          </div>
        </form>

        <!-- Action Buttons -->
        <div class="pt-4">
          <button id="editBtn" 
            class="w-full h-12 bg-gradient-to-r from-blue-500 to-purple-500 hover:opacity-90 
                   transition-all duration-300 shadow-md rounded-lg text-white font-semibold text-base flex items-center justify-center">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path d="M17.414 2.586a2 2 0 00-2.828 0L6 11.172V14h2.828l8.586-8.586a2 2 0 000-2.828z"/>
            </svg>
            Edit Profile
          </button>

          <div id="saveCancelBtns" class="hidden flex gap-3 mt-4">
            <button id="cancelBtn" 
              class="flex-1 h-12 border border-gray-300 rounded-lg hover:bg-gray-100 transition-all duration-300">
              Cancel
            </button>
            <button id="saveBtn" 
              class="flex-1 h-12 bg-gradient-to-r from-blue-500 to-purple-500 hover:opacity-90 
                     transition-all duration-300 shadow-md rounded-lg text-white font-semibold flex items-center justify-center">
              <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17 3a2 2 0 00-2-2H5a2 2 0 00-2 2v14l4-4h8a2 2 0 002-2V3z"/>
              </svg>
              Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
   










const saveBtn = document.getElementById("saveBtn"); // your actual Save button
const inputs = document.querySelectorAll("#adminForm input");

// Enable editing
const editBtn = document.getElementById("editBtn");
const saveCancelBtns = document.getElementById("saveCancelBtns");
const cancelBtn = document.getElementById("cancelBtn");

editBtn.addEventListener("click", () => {
  inputs.forEach(input => input.disabled = false);
  editBtn.classList.add("hidden");
  saveCancelBtns.classList.remove("hidden");
});

// Cancel editing
cancelBtn.addEventListener("click", () => {
  inputs.forEach(input => input.disabled = true);
  editBtn.classList.remove("hidden");
  saveCancelBtns.classList.add("hidden");
});

// Save changes for Super Admin
saveBtn.addEventListener("click", async () => {
  const updatedData = {
    username: document.getElementById("username").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  try {
    const response = await fetch("http://localhost:8000/api/superadmin/update", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(updatedData)
    });

    const result = await response.json();

    if (!response.ok) {
      throw new Error(result.message || "Failed to update super admin");
    }

    alert("✅ Super Admin updated successfully!");
    document.getElementById("password").value = "";
    inputs.forEach(input => input.disabled = true);
    editBtn.classList.remove("hidden");
    saveCancelBtns.classList.add("hidden");

  } catch (error) {
    console.error(error);
    alert("❌ Error updating super admin. Check console for details.");
  }
});


  


  







  </script>
</body>
</html>
