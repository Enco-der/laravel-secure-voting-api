<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Table</title>

<script>
     tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'bounce-in': 'bounceIn 0.6s ease-out',
                        'pulse-slow': 'pulse 3s infinite'
                    }
                }
            }
        }
</script>

   <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.2);
        }
        
        .btn-hover:hover {
            transform: translateY(-1px);
        }
        
        .table-row:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .status-active {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }
        
        .status-inactive {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        
        .status-pending {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
    </style>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<header class="relative z-10 px-4 py-3 bg-gray-800 shadow-lg">
  <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
    
    <!-- Left side: Logo + Title -->
    <div class="flex items-center space-x-3 animate-fade-in">
      <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center shadow-lg">
        <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold text-white">SecureVote</h1>
        <p class="text-white/80 text-sm">Super Admin Panel</p>
      </div>
    </div>

    <!-- Center: Search Bar -->
    <div class="flex-1 flex justify-center">
      <div class="relative w-full max-w-md">
        <input 
          type="text" 
          placeholder="Search admins..." 
          class="w-full pl-9 pr-3 py-2 bg-white/10 border border-white/20 rounded-lg text-white placeholder-white/60 focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all duration-300" id="searchInput"
        >
        <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-white/50" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
        </svg>
      </div>
    </div>

    <!-- Right side: Button -->
    <div>
      <a href="addAdmin.html" 
         class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-all duration-300 flex items-center">
        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
        </svg>
        Add New Admin
      </a>
    </div>

  </div>
</header>






<div class="bg-gray-100 py-8">  
  <div class="w-full max-w-6xl mx-auto p-4 sm:p-8">
    <div class="rounded-lg overflow-hidden shadow-2xl border border-gray-300 bg-gradient-to-br from-white via-white to-gray-100">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-800">
              <th class="px-6 py-4 text-left font-bold text-white uppercase tracking-wider">S.No</th>
              <th class="px-6 py-4 text-left font-bold text-white uppercase tracking-wider">Username</th>
              <th class="px-6 py-4 text-left font-bold text-white uppercase tracking-wider">Email</th>
              <th class="px-6 py-4 text-center font-bold text-white uppercase tracking-wider">Update</th>
              <th class="px-6 py-4 text-center font-bold text-white uppercase tracking-wider">Delete</th>
            </tr>
          </thead>
          <tbody id="userTableBody" class="divide-y divide-gray-300">
            <!-- Rows will be inserted dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>



<script>
  // Replace this URL with your Laravel API URL
  const API_URL = "http://127.0.0.1:8000/api/showadmins";

  // Function to fetch admins and display them
  async function fetchAdmins() {
    try {
      const response = await fetch(API_URL);
      const result = await response.json();

      if (result.success) {
        const tbody = document.getElementById("userTableBody");
        tbody.innerHTML = ""; // Clear old rows if any

        result.data.forEach((admin, index) => {
          const row = document.createElement("tr");
          row.classList.add("hover:bg-gray-100");

          row.innerHTML = `
  <td class="px-6 py-4">${index + 1}</td>
  <td class="px-6 py-4">${admin.name ?? ''}</td>
  <td class="px-6 py-4">${admin.email ?? ''}</td>
  <td class="px-6 py-4 text-center">
    <button
     class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded">
     <a href="edit.html?id=${admin.id}">Update</>
      
    </button>
  </td>
  <td class="px-6 py-4 text-center">
    <button onclick="deleteAdmin(${admin.id})" 
      class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded">
      Delete
    </button>
  </td>
`;


          tbody.appendChild(row);
        });
      } else {
        console.error("Failed to fetch admins:", result);
      }
    } catch (error) {
      console.error("Error fetching admins:", error);
    }
  }

  // Load data when page loads
  document.addEventListener("DOMContentLoaded", fetchAdmins);




  function setupSearch() {
    const searchInput = document.getElementById("searchInput");
    const tbody = document.getElementById("userTableBody");

    searchInput.addEventListener("input", function () {
      const keyword = searchInput.value.toLowerCase().trim();
      const rows = tbody.getElementsByTagName("tr");

      for (let i = 0; i < rows.length; i++) {
        const usernameCell = rows[i].getElementsByTagName("td")[1]; // 2nd column = username
        if (usernameCell) {
          const username = usernameCell.textContent.toLowerCase();
          rows[i].style.display = username.includes(keyword) ? "" : "none";
        }
      }
    });
  }

  // Call search setup after page loads
  document.addEventListener("DOMContentLoaded", setupSearch);





  async function deleteAdmin(id) {
    if (!confirm("Are you sure you want to delete this admin?")) {
        return;
    }

    try {
        let response = await fetch(`http://127.0.0.1:8000/api/admins/${id}`, {
            method: "DELETE",
            headers: {
                "Accept": "application/json",
                "Content-Type": "application/json"
            }
        });

        let data = await response.json();

        if (response.ok) {
            alert(data.message);
            // Remove row from table
            document.getElementById(`admin-${id}`).remove();
        } else {
            alert("Error: " + (data.message || "Something went wrong"));
        }
    } catch (error) {
        console.error("Error deleting admin:", error);
        alert("Failed to delete admin.");
    }
}

</script>

</body>
</html>
